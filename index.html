<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeopardy</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1 id="game-title">JEOPARDY!</h1>
    <div class="score-area">
      <span class="score-label">Score</span>
      <span id="score">0</span>
      <div class="score-buttons">
        <button id="plus" title="Add the clue value">+</button>
        <button id="minus" title="Subtract the clue value">−</button>
        <button id="reset" title="Reset score & board">Reset</button>
      </div>
    </div>
  </header>

  <main>
    <div id="board" class="board"><!-- Board is generated by script.js --></div>
  </main>

  <!-- Clue / answer popup -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <p id="modal-category" class="modal-category"></p>
      <p id="modal-value" class="modal-value"></p>
      <p id="modal-clue" class="modal-clue"></p>
      <p id="modal-answer" class="modal-answer hidden"></p>
      <div class="modal-buttons">
        <button id="reveal">Reveal Answer</button>
        <button id="close">Close</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
